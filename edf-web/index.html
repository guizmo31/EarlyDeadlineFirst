<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDF Scheduler</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/shared/nav.css">
</head>
<body>
    <header>
        <h1>Scheduler</h1>
        <span id="topology-context" class="topology-badge"></span>
        <nav id="tool-nav"></nav>
        <script src="/shared/nav.js"></script>
    </header>

    <main>
        <section id="config-panel">
            <h2>Configuration</h2>

            <div class="config-row">
                <label for="tick-period">Tick Period (ms):</label>
                <input type="number" id="tick-period" value="1" min="1">
            </div>

            <div class="config-row">
                <label for="sim-duration">Simulation Duration (ms):</label>
                <input type="number" id="sim-duration" value="120" min="1">
            </div>

            <div class="config-row">
                <label for="num-cores">CPU Cores:</label>
                <input type="number" id="num-cores" value="1" min="1" max="16">
            </div>

            <div class="config-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="fixed-partitioning">
                    Fixed Partitioning
                </label>
                <span class="config-hint" title="Once a process starts on a core, it stays there (no migration)">?</span>
            </div>

            <div id="usecases-section" class="hidden">
                <h3>Use Cases</h3>
                <div id="usecase-list"></div>
            </div>

            <h3>Processes</h3>
            <div id="process-list"></div>

            <button id="add-process-btn" class="btn btn-secondary">+ Add Process</button>

            <div class="actions">
                <div class="actions-row">
                    <button id="save-btn" class="btn btn-secondary btn-half">Save Config</button>
                    <button id="load-btn" class="btn btn-secondary btn-half">Load Config</button>
                </div>
            </div>
            <input type="file" id="load-file-input" accept=".json" class="hidden">

            <div id="schedulability-box" class="hidden"></div>

            <div id="stats" class="hidden">
                <h3>Statistics</h3>
                <p>Theoretical Utilization: <span id="cpu-util"></span></p>
                <p>Cores: <span id="cores-info"></span></p>
                <div id="per-core-stats"></div>
                <p>Global CPU Used: <span id="cpu-total"></span></p>
                <p>Deadline Misses: <span id="deadline-misses"></span></p>
                <div id="budget-overruns"></div>
                <div id="degraded-events"></div>
            </div>

            <div id="error-box" class="hidden"></div>
        </section>

        <section id="chart-panel">
            <div class="chart-header">
                <h2>Schedule (Gantt Chart)</h2>
                <button id="simulate-btn" class="btn btn-primary">Update Scheduling</button>
            </div>
            <div id="chart-container">
                <canvas id="gantt-canvas"></canvas>
            </div>
            <div id="tooltip" class="hidden"></div>
            <div id="legend"></div>
        </section>
    </main>

    <!-- Modal: Load from server -->
    <div id="load-modal-overlay" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;">
        <div style="background:#16213e;border:1px solid #533483;border-radius:8px;padding:20px;min-width:320px;max-width:400px;">
            <h3 style="color:#e94560;margin-bottom:12px;font-size:1rem;">Load Config</h3>
            <select id="load-server-select" style="width:100%;padding:6px;font-size:13px;background:#0f3460;color:#e0e0e0;border:1px solid #533483;border-radius:4px;margin-bottom:8px;">
                <option value="">Loading...</option>
            </select>
            <div id="load-server-info" style="font-size:11px;color:#a0a0c0;margin-bottom:12px;"></div>
            <div style="display:flex;gap:8px;justify-content:flex-end;">
                <button id="btn-load-srv-cancel" class="btn btn-secondary" style="width:auto;">Cancel</button>
                <button id="btn-load-srv-local" class="btn btn-secondary" style="width:auto;">Local file...</button>
                <button id="btn-load-srv-ok" class="btn btn-primary" style="width:auto;margin-top:0;">Load</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
